<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Screener</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Source+Serif+4:opsz,wght@8..60,600;8..60,700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #1A2550;
      --teal: #1A5530;
      --bg: #ffffff;
      --surface: #f7f8fb;
      --border: #e2e6ef;
      --text: #1a1f36;
      --muted: #5c6578;
      --green: #1a7a45;
      --green-bg: #e8f6ee;
      --orange: #c46a12;
      --orange-bg: #fff3e6;
      --red: #c0392b;
      --red-bg: #fdecea;
      --shadow: 0 12px 40px rgba(26, 37, 80, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "DM Sans", sans-serif;
      background:
        radial-gradient(ellipse 80% 50% at 10% -10%, rgba(26, 85, 48, 0.08), transparent 50%),
        radial-gradient(ellipse 60% 40% at 100% 0%, rgba(26, 37, 80, 0.07), transparent 45%),
        var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.5;
    }

    .wrap {
      max-width: 960px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    /* Header */
    header {
      margin-bottom: 2.25rem;
      animation: fadeUp 0.5s ease both;
    }

    header h1 {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: clamp(2rem, 4vw, 2.75rem);
      font-weight: 700;
      color: var(--navy);
      letter-spacing: -0.02em;
      line-height: 1.15;
    }

    header p {
      margin-top: 0.5rem;
      color: var(--muted);
      font-size: 1.05rem;
      max-width: 36rem;
    }

    /* Input section */
    .inputs {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.25rem;
      animation: fadeUp 0.55s ease 0.05s both;
    }

    @media (max-width: 720px) {
      .inputs { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      min-height: 220px;
      display: flex;
      flex-direction: column;
    }

    .panel label {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--navy);
      margin-bottom: 0.75rem;
    }

    .dropzone {
      flex: 1;
      border: 2px dashed #c5cddc;
      border-radius: 10px;
      background: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.2s;
      gap: 0.35rem;
    }

    .dropzone:hover,
    .dropzone.dragover {
      border-color: var(--teal);
      background: rgba(26, 85, 48, 0.04);
      transform: translateY(-1px);
    }

    .dropzone .icon {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: rgba(26, 37, 80, 0.08);
      color: var(--navy);
      display: grid;
      place-items: center;
      font-size: 1.25rem;
      margin-bottom: 0.4rem;
    }

    .dropzone strong { color: var(--navy); font-weight: 600; }
    .dropzone span { color: var(--muted); font-size: 0.9rem; }
    .dropzone .filename {
      margin-top: 0.5rem;
      color: var(--teal);
      font-weight: 600;
      font-size: 0.9rem;
      word-break: break-all;
    }

    #resumeInput { display: none; }

    textarea {
      flex: 1;
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
      font: inherit;
      color: var(--text);
      background: #fff;
      resize: vertical;
      min-height: 160px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      border-color: var(--navy);
      box-shadow: 0 0 0 3px rgba(26, 37, 80, 0.12);
    }

    textarea::placeholder { color: #9aa3b5; }

    .actions {
      animation: fadeUp 0.6s ease 0.1s both;
      margin-bottom: 2rem;
    }

    #screenBtn {
      appearance: none;
      border: none;
      background: var(--navy);
      color: #fff;
      font: inherit;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.9rem 1.75rem;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 8px 20px rgba(26, 37, 80, 0.25);
    }

    #screenBtn:hover:not(:disabled) {
      background: #243366;
      transform: translateY(-1px);
    }

    #screenBtn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
      box-shadow: none;
    }

    /* Loading */
    #loading {
      display: none;
      align-items: center;
      gap: 0.85rem;
      padding: 1.25rem 1.4rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 1.5rem;
      color: var(--navy);
      font-weight: 500;
      animation: fadeUp 0.3s ease both;
    }

    #loading.visible { display: flex; }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid rgba(26, 37, 80, 0.15);
      border-top-color: var(--teal);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }

    /* Error */
    #error {
      display: none;
      padding: 1rem 1.2rem;
      background: var(--red-bg);
      color: var(--red);
      border: 1px solid #f5c6c1;
      border-radius: 10px;
      margin-bottom: 1.5rem;
      font-weight: 500;
    }

    #error.visible { display: block; }

    /* Results */
    #results {
      display: none;
      animation: fadeUp 0.45s ease both;
    }

    #results.visible { display: block; }

    .score-wrap {
      display: flex;
      justify-content: center;
      margin-bottom: 2rem;
    }

    .score-circle {
      width: 160px;
      height: 160px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      background: conic-gradient(var(--score-color) calc(var(--score) * 1%), #e8ebf2 0);
      position: relative;
      box-shadow: var(--shadow);
      animation: popIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    .score-circle::before {
      content: "";
      position: absolute;
      inset: 14px;
      background: #fff;
      border-radius: 50%;
    }

    .score-inner {
      position: relative;
      z-index: 1;
      text-align: center;
    }

    .score-inner .pct {
      font-family: "Source Serif 4", Georgia, serif;
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--navy);
      line-height: 1;
    }

    .score-inner .lbl {
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-top: 0.25rem;
      font-weight: 600;
    }

    .skills-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }

    @media (max-width: 720px) {
      .skills-cols { grid-template-columns: 1fr; }
    }

    .skills-box {
      background: #fff;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.25rem;
      box-shadow: var(--shadow);
    }

    .skills-box h3 {
      font-size: 0.95rem;
      color: var(--navy);
      margin-bottom: 0.85rem;
      font-weight: 700;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
    }

    .badge {
      display: inline-block;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 600;
    }

    .badge.green { background: var(--green-bg); color: var(--green); }
    .badge.red { background: var(--red-bg); color: var(--red); }
    .badge.navy { background: rgba(26, 37, 80, 0.08); color: var(--navy); }
    .badge.teal { background: rgba(26, 85, 48, 0.1); color: var(--teal); }

    .empty-hint {
      color: var(--muted);
      font-size: 0.9rem;
    }

    .explanation {
      background: #fff;
      border: 1px solid var(--border);
      border-left: 4px solid var(--teal);
      border-radius: 14px;
      padding: 1.35rem 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow);
    }

    .explanation h3 {
      font-size: 0.95rem;
      color: var(--navy);
      margin-bottom: 0.65rem;
      font-weight: 700;
    }

    .explanation p {
      color: var(--text);
      white-space: pre-wrap;
    }

    .lists-cols {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }

    @media (max-width: 720px) {
      .lists-cols { grid-template-columns: 1fr; }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.85); }
      to { opacity: 1; transform: scale(1); }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Resume Screener</h1>
      <p>AI-powered matching using MiniLM + spaCy + Ollama</p>
    </header>

    <section class="inputs" aria-label="Inputs">
      <div class="panel">
        <label for="resumeInput">Upload Resume PDF</label>
        <div class="dropzone" id="dropzone" tabindex="0" role="button" aria-label="Upload resume PDF">
          <div class="icon">↑</div>
          <strong>Drag & drop PDF here</strong>
          <span>or click to browse</span>
          <div class="filename" id="fileName" hidden></div>
        </div>
        <input type="file" id="resumeInput" accept="application/pdf,.pdf" />
      </div>

      <div class="panel">
        <label for="jdText">Job Description</label>
        <textarea id="jdText" placeholder="Paste job description here…"></textarea>
      </div>
    </section>

    <div class="actions">
      <button type="button" id="screenBtn">Screen Resume</button>
    </div>

    <div id="loading" role="status" aria-live="polite">
      <div class="spinner" aria-hidden="true"></div>
      <span>Analyzing resume...</span>
    </div>

    <div id="error" role="alert"></div>

    <section id="results" aria-label="Results">
      <div class="score-wrap">
        <div class="score-circle" id="scoreCircle" style="--score: 0; --score-color: #1a7a45;">
          <div class="score-inner">
            <div class="pct" id="scorePct">0%</div>
            <div class="lbl">Match</div>
          </div>
        </div>
      </div>

      <div class="skills-cols">
        <div class="skills-box">
          <h3>Matched Skills</h3>
          <div class="badges" id="matchedSkills"></div>
        </div>
        <div class="skills-box">
          <h3>Missing Skills</h3>
          <div class="badges" id="missingSkills"></div>
        </div>
      </div>

      <div class="explanation">
        <h3>AI Explanation</h3>
        <p id="explanation"></p>
      </div>

      <div class="lists-cols">
        <div class="skills-box">
          <h3>Resume Skills</h3>
          <div class="badges" id="resumeSkills"></div>
        </div>
        <div class="skills-box">
          <h3>JD Skills</h3>
          <div class="badges" id="jdSkills"></div>
        </div>
      </div>
    </section>
  </div>

  <script>
    const API_BASE = "http://localhost:8010";

    const dropzone = document.getElementById("dropzone");
    const resumeInput = document.getElementById("resumeInput");
    const fileName = document.getElementById("fileName");
    const jdText = document.getElementById("jdText");
    const screenBtn = document.getElementById("screenBtn");
    const loading = document.getElementById("loading");
    const errorEl = document.getElementById("error");
    const results = document.getElementById("results");

    let selectedFile = null;

    function setFile(file) {
      if (!file) return;
      if (file.type !== "application/pdf" && !file.name.toLowerCase().endsWith(".pdf")) {
        showError("Please upload a PDF resume.");
        return;
      }
      selectedFile = file;
      fileName.hidden = false;
      fileName.textContent = file.name;
      hideError();
    }

    dropzone.addEventListener("click", () => resumeInput.click());
    dropzone.addEventListener("keydown", (e) => {
      if (e.key === "Enter" || e.key === " ") {
        e.preventDefault();
        resumeInput.click();
      }
    });

    resumeInput.addEventListener("change", () => {
      if (resumeInput.files && resumeInput.files[0]) setFile(resumeInput.files[0]);
    });

    ["dragenter", "dragover"].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.add("dragover");
      });
    });

    ["dragleave", "drop"].forEach((evt) => {
      dropzone.addEventListener(evt, (e) => {
        e.preventDefault();
        dropzone.classList.remove("dragover");
      });
    });

    dropzone.addEventListener("drop", (e) => {
      const file = e.dataTransfer.files && e.dataTransfer.files[0];
      if (file) setFile(file);
    });

    function showError(msg) {
      errorEl.textContent = msg;
      errorEl.classList.add("visible");
    }

    function hideError() {
      errorEl.classList.remove("visible");
      errorEl.textContent = "";
    }

    function renderBadges(container, items, tone) {
      container.innerHTML = "";
      if (!items || !items.length) {
        const hint = document.createElement("span");
        hint.className = "empty-hint";
        hint.textContent = "None";
        container.appendChild(hint);
        return;
      }
      items.forEach((skill) => {
        const badge = document.createElement("span");
        badge.className = "badge " + tone;
        badge.textContent = skill;
        container.appendChild(badge);
      });
    }

    function scoreColor(pct) {
      if (pct > 70) return "#1a7a45";
      if (pct >= 40) return "#c46a12";
      return "#c0392b";
    }

    function populateResults(data) {
      const match = data.match || {};
      const pct = Number(match.match_percentage ?? 0);

      const circle = document.getElementById("scoreCircle");
      circle.style.setProperty("--score", String(pct));
      circle.style.setProperty("--score-color", scoreColor(pct));
      document.getElementById("scorePct").textContent = pct + "%";

      renderBadges(document.getElementById("matchedSkills"), match.matched_skills, "green");
      renderBadges(document.getElementById("missingSkills"), match.missing_skills, "red");
      renderBadges(document.getElementById("resumeSkills"), match.resume_skills, "navy");
      renderBadges(document.getElementById("jdSkills"), match.jd_skills, "teal");

      document.getElementById("explanation").textContent =
        data.explanation || "No explanation available.";

      results.classList.add("visible");
    }

    screenBtn.addEventListener("click", async () => {
      hideError();
      results.classList.remove("visible");

      if (!selectedFile) {
        showError("Please upload a resume PDF.");
        return;
      }
      if (!jdText.value.trim()) {
        showError("Please paste a job description.");
        return;
      }

      const formData = new FormData();
      formData.append("resume", selectedFile);
      formData.append("jd_text", jdText.value.trim());

      screenBtn.disabled = true;
      loading.classList.add("visible");

      try {
        const res = await fetch(API_BASE + "/screen", {
          method: "POST",
          body: formData,
        });

        let payload = null;
        try {
          payload = await res.json();
        } catch (_) {
          payload = null;
        }

        if (!res.ok) {
          const detail = payload && (payload.detail || payload.message);
          throw new Error(detail || ("Request failed (" + res.status + ")"));
        }

        populateResults(payload);
      } catch (err) {
        showError(err.message || "Something went wrong while screening.");
      } finally {
        loading.classList.remove("visible");
        screenBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
